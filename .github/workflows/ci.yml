name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin QEMU version exactly to the one docker-macos builds against
# (see docker-macos/Dockerfile ARG QEMU_VERSION). Bump both in lockstep.
env:
  QEMU_VERSION: "11.0.0"

jobs:
  # -------------------------------------------------------------------------
  # Clang -fsyntax-only — tests that our overlay .c/.h files are still valid
  # C against the upstream QEMU headers they #include. This does NOT link;
  # it just parses. Cheap, fast, catches API drift when QEMU bumps.
  #
  # Strategy:
  #   1. Download the exact QEMU tarball docker-macos pins to.
  #   2. Overlay our files on top (same layout Dockerfile uses).
  #   3. Run `./configure` far enough to generate config-host.h + trace.h.
  #   4. Run clang -fsyntax-only on each of our files with QEMU's include
  #      paths wired up.
  # -------------------------------------------------------------------------
  clang-syntax:
    name: clang -fsyntax-only (vs upstream qemu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: fork

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-qemu-syntax-v1-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-qemu-syntax-v1-

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang meson ninja-build pkg-config python3 python3-venv \
            libglib2.0-dev libpixman-1-dev libfdt-dev \
            libcap-ng-dev libseccomp-dev libslirp-dev libaio-dev \
            curl xz-utils

      - name: Cache upstream QEMU tarball
        uses: actions/cache@v4
        with:
          path: qemu-tarball
          key: qemu-${{ env.QEMU_VERSION }}-tarball-v1
          restore-keys: |
            qemu-${{ env.QEMU_VERSION }}-tarball-

      - name: Fetch upstream QEMU ${{ env.QEMU_VERSION }}
        run: |
          mkdir -p qemu-tarball
          if [ ! -f "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz" ]; then
            curl -sSL -o "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz" \
              "https://download.qemu.org/qemu-${QEMU_VERSION}.tar.xz"
          fi
          tar xJf "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz"
          mv "qemu-${QEMU_VERSION}" qemu-src

      - name: Overlay fork files onto upstream tree
        run: |
          set -eux
          cp fork/hw/misc/applesmc.c                  qemu-src/hw/misc/applesmc.c
          cp fork/hw/display/vmware_vga.c             qemu-src/hw/display/vmware_vga.c
          cp fork/hw/usb/dev-hid.c                    qemu-src/hw/usb/dev-hid.c
          cp fork/hw/display/apple-gfx-pci-linux.c    qemu-src/hw/display/
          cp fork/hw/display/apple-gfx-common-linux.c qemu-src/hw/display/
          cp fork/hw/display/apple-gfx-linux.h        qemu-src/hw/display/
          cp fork/hw/display/meson.build              qemu-src/hw/display/meson.build
          cp fork/hw/display/Kconfig                  qemu-src/hw/display/Kconfig
          cp fork/hw/display/trace-events             qemu-src/hw/display/trace-events

      - name: Configure QEMU enough to generate build headers
        working-directory: qemu-src
        run: |
          # --disable-docs + narrow --target-list keeps configure fast.
          # We don't need a full build — just enough for meson to emit
          # config-host.h, qemu-options.def, and per-target trace.h files
          # that our .c files include transitively.
          ./configure \
            --target-list=x86_64-softmmu \
            --disable-docs \
            --disable-werror \
            --disable-debug-info \
            --disable-tools

      - name: clang -fsyntax-only on fork sources
        working-directory: qemu-src
        run: |
          set -eu
          # Common include flags: QEMU's public include tree, target-specific
          # headers, and the meson-generated build dir for config-host.h.
          inc=(
            -Iinclude -Ihw/display
            -Ibuild -Ibuild/x86_64-softmmu
            -I/usr/include/glib-2.0
            -I/usr/lib/x86_64-linux-gnu/glib-2.0/include
            -I/usr/include/pixman-1
          )
          # Match QEMU's own defines so the headers parse the same way.
          defs=(-D_GNU_SOURCE -DNEED_CPU_H -DCOMPILING_PER_TARGET)
          # Files we own (restrict to these — we don't want upstream
          # regressions showing up on our status).
          files=(
            hw/display/apple-gfx-pci-linux.c
            hw/display/apple-gfx-common-linux.c
            hw/misc/applesmc.c
            hw/display/vmware_vga.c
            hw/usb/dev-hid.c
          )
          for f in "${files[@]}"; do
            echo "=== clang -fsyntax-only $f ==="
            # `|| echo` tolerated here: QEMU's build-time generated headers
            # (trace.h per-subdir, target-specific CPU headers) aren't always
            # fully wired up by a bare `./configure` without a full compile.
            # We still run clang so real syntax errors surface as diagnostic
            # output and the log is grep-able. If you want this to be a hard
            # gate, swap to the full QEMU compile job (expensive: ~15 min).
            clang -fsyntax-only -std=gnu11 "${inc[@]}" "${defs[@]}" "$f" || \
              echo "::warning file=$f::clang -fsyntax-only reported issues (may be generated-header related)"
          done

  # -------------------------------------------------------------------------
  # Upstream-PR patch validation — every .patch under upstream-pr/*/ must
  # still apply cleanly against a pristine upstream QEMU tree. This is the
  # single most important gate: if a patch rots, we silently lose ability
  # to submit to the upstream mailing list.
  #
  # Uses `git am --check` so we get the full "would this email-patch apply?"
  # semantics, not just `git apply --check`.
  # -------------------------------------------------------------------------
  upstream-pr-apply:
    name: upstream-pr patches apply cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: fork

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils

      - name: Cache upstream QEMU tarball
        uses: actions/cache@v4
        with:
          path: qemu-tarball
          key: qemu-${{ env.QEMU_VERSION }}-tarball-v1
          restore-keys: |
            qemu-${{ env.QEMU_VERSION }}-tarball-

      - name: Fetch and extract upstream QEMU ${{ env.QEMU_VERSION }}
        run: |
          mkdir -p qemu-tarball
          if [ ! -f "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz" ]; then
            curl -sSL -o "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz" \
              "https://download.qemu.org/qemu-${QEMU_VERSION}.tar.xz"
          fi
          tar xJf "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz"
          mv "qemu-${QEMU_VERSION}" qemu-src

      - name: Init git repo on upstream tree
        # `git am` requires a git repo. We don't have upstream history, so we
        # make a fresh single-commit repo at the exact release tarball state.
        working-directory: qemu-src
        run: |
          git init -q -b master
          git config user.email ci@example.com
          git config user.name  CI
          git add -A
          git -c commit.gpgsign=false commit -q -m "qemu-${QEMU_VERSION} release tarball (CI baseline)"

      - name: Validate each series applies
        working-directory: qemu-src
        run: |
          set -e
          shopt -s nullglob
          failed=0
          for series_dir in ../fork/upstream-pr/*/; do
            [ -d "$series_dir" ] || continue
            series_name=$(basename "$series_dir")
            patches=( "$series_dir"/*.patch )
            if [ ${#patches[@]} -eq 0 ]; then
              echo "::notice::$series_name has no .patch files — skipping"
              continue
            fi
            echo "=== series: $series_name (${#patches[@]} patches) ==="
            # Use a throwaway branch so a failure in one series doesn't leak
            # into the next.
            git checkout -q -b "probe-$series_name" master
            if git am --keep-non-patch "${patches[@]}"; then
              echo "OK: $series_name applied cleanly"
            else
              echo "::error::Series $series_name failed to apply against upstream qemu-${QEMU_VERSION}"
              git am --abort 2>/dev/null || true
              failed=1
            fi
            git checkout -q master
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

  # -------------------------------------------------------------------------
  # Real QEMU configure + compile (capped) — the single strongest gate on
  # this repo. Overlays our hw/* + pc-bios/* files onto a pristine upstream
  # QEMU tarball, then runs the real `./configure` + a time-boxed `make`.
  # Catches what the cheap clang-syntax job can't: meson/Kconfig drift,
  # trace.h generation collisions, cross-file symbol clashes, ROM blob
  # packaging, and the class of API-drift bug M1 was quietly eating.
  # -------------------------------------------------------------------------
  meson-setup:
    name: meson setup + capped compile (vs upstream qemu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: fork

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-qemu-meson-v1-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-qemu-meson-v1-

      - name: Install QEMU build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang meson ninja-build pkg-config \
            python3 python3-venv python3-tomli \
            libglib2.0-dev libpixman-1-dev libfdt-dev \
            libcap-ng-dev libseccomp-dev libslirp-dev libaio-dev \
            libepoxy-dev libgtk-3-dev libsdl2-dev \
            curl xz-utils bzip2 git

      - name: Cache upstream QEMU tarball
        uses: actions/cache@v4
        with:
          path: qemu-tarball
          key: qemu-${{ env.QEMU_VERSION }}-tarball-v1
          restore-keys: |
            qemu-${{ env.QEMU_VERSION }}-tarball-

      - name: Fetch upstream QEMU ${{ env.QEMU_VERSION }}
        run: |
          mkdir -p qemu-tarball
          if [ ! -f "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz" ]; then
            curl -sSL -o "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz" \
              "https://download.qemu.org/qemu-${QEMU_VERSION}.tar.xz"
          fi
          tar xJf "qemu-tarball/qemu-${QEMU_VERSION}.tar.xz"
          mv "qemu-${QEMU_VERSION}" qemu-src

      - name: Overlay fork files onto upstream tree
        # Mirrors what docker-macos/Dockerfile does. Keep in lockstep:
        # if the Dockerfile gains a cp line, add it here too, otherwise
        # CI will green on a set of files that production never builds.
        run: |
          set -eux
          cp fork/hw/misc/applesmc.c                  qemu-src/hw/misc/applesmc.c
          cp fork/hw/display/vmware_vga.c             qemu-src/hw/display/vmware_vga.c
          cp fork/hw/usb/dev-hid.c                    qemu-src/hw/usb/dev-hid.c
          cp fork/hw/display/apple-gfx-pci-linux.c    qemu-src/hw/display/
          cp fork/hw/display/apple-gfx-common-linux.c qemu-src/hw/display/
          cp fork/hw/display/apple-gfx-linux.h        qemu-src/hw/display/
          cp fork/hw/display/meson.build              qemu-src/hw/display/meson.build
          cp fork/hw/display/Kconfig                  qemu-src/hw/display/Kconfig
          cp fork/hw/display/trace-events             qemu-src/hw/display/trace-events
          cp fork/pc-bios/meson.build                 qemu-src/pc-bios/meson.build
          cp fork/pc-bios/apple-gfx-pci.rom           qemu-src/pc-bios/apple-gfx-pci.rom

      - name: configure (x86_64-softmmu)
        working-directory: qemu-src
        # Hard-fail: configure MUST succeed. This is the gate that would
        # have caught the M1 API-drift class of bug (new field names,
        # removed macros, Kconfig syntax changes).
        run: |
          ./configure \
            --target-list=x86_64-softmmu \
            --disable-werror \
            --disable-docs \
            --disable-debug-info \
            --disable-tools

      - name: make (time-boxed compile)
        working-directory: qemu-src
        # Cap at ~10 min with `timeout`. We don't need a full build; we
        # need proof that ninja gets past the per-subdir trace.h and
        # hw/display Kconfig expansion without errors. If the 10-minute
        # cap is hit we treat that as success (configure + partial build
        # both worked) — the next CI run with a warm cache will push
        # further. If ninja errors out before the cap, that's a real
        # breakage and fails the job.
        # Exit statuses:
        #   0   = full build completed
        #   124 = timeout hit (treated as success — we compiled SOMETHING)
        #   *   = real build error (re-raised)
        run: |
          set +e
          timeout --preserve-status 600 make -j"$(nproc)"
          rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "::notice::full make completed"
          elif [ "$rc" -eq 124 ] || [ "$rc" -eq 143 ]; then
            echo "::notice::make hit 10-min timeout cap — configure + partial compile both succeeded"
            exit 0
          else
            echo "::error::make failed with exit $rc"
            exit "$rc"
          fi

      - name: Upload configure + meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-configure-logs
          path: |
            qemu-src/config.log
            qemu-src/build/meson-logs/meson-log.txt
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Forbidden-syntax-patterns — a cheap static scan for known-bad upstream
  # API usage that would break against QEMU 10+. Runs in seconds, no
  # configure needed. Complements the meson-setup job (which catches the
  # same bugs but in ~10 min): this one catches them instantly so PR
  # authors don't wait on a long build to learn they typed the wrong macro.
  # -------------------------------------------------------------------------
  forbidden-syntax-patterns:
    name: no removed-in-qemu10 patterns in overlay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan hw/ for DEFINE_PROP_END_OF_LIST
        # Removed in QEMU 10+; property arrays are now terminated by
        # a bare {} empty initializer. Any occurrence in overlay code
        # is a build break waiting to happen.
        run: |
          set -e
          if grep -rnE --include='*.c' --include='*.h' \
               'DEFINE_PROP_END_OF_LIST' hw/; then
            echo "::error::DEFINE_PROP_END_OF_LIST is removed in QEMU 10+. Drop the sentinel or replace with {}."
            exit 1
          fi
          echo "hw/ overlay: no DEFINE_PROP_END_OF_LIST."

      - name: Scan Kconfig for minikconf-incompatible syntax
        # QEMU's minikconf supports only the `bool` + `depends on` + `select`
        # + `default` subset. The full Kconfig `bool "prompt string"` form
        # and `help` lines are rejected with a parse error. Catch locally
        # before configure does.
        run: |
          set -e
          fail=0
          # Match: optional leading whitespace, the word `bool` as a
          # standalone token, then whitespace + a double quote.
          if grep -rnE --include='Kconfig' \
               '^[[:space:]]*bool[[:space:]]+"' hw/; then
            echo "::error::Kconfig prompt form (bool \"...\") is not supported by QEMU minikconf. Use bare bool on its own line."
            fail=1
          fi
          if grep -rnE --include='Kconfig' \
               '^[[:space:]]*help([[:space:]]|$)' hw/; then
            echo "::error::Kconfig help block is not supported by QEMU minikconf. Delete the help text."
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "hw/ Kconfig: minikconf-compatible."

      - name: Scan upstream-pr/**/src for the same patterns
        # upstream-pr/*/src/ is the staging form of files before they're
        # emitted as .patch via git format-patch. If these files drift
        # they'll break the moment someone regenerates the patch series.
        run: |
          set -e
          fail=0
          if [ -d upstream-pr ]; then
            if grep -rnE --include='*.c' --include='*.h' \
                 'DEFINE_PROP_END_OF_LIST' upstream-pr/; then
              echo "::error::DEFINE_PROP_END_OF_LIST in upstream-pr/ staging source"
              fail=1
            fi
          fi
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "upstream-pr/ staging: clean."

  # -------------------------------------------------------------------------
  # Fork-local identifier scan — the whole point of this repo is that it's a
  # STAGING ground for upstream QEMU patches. Identifiers that reveal the
  # fork's existence (mos15, mos-qemu, MattJackson, mjackson, pq.io,
  # opencore15) must NEVER appear in upstream-destined code or patch bodies.
  #
  # The regex is narrowly targeted:
  #   - `hw/**/*.{c,h}`         : the overlay source files themselves.
  #   - `upstream-pr/**/*.patch`: only lines starting with `+` (added code);
  #                               patch MAIL HEADERS (From:, Signed-off-by:,
  #                               Reported-by:, Suggested-by:, Cc:) are fine,
  #                               the upstream maintainers expect them.
  #
  # Fork-internal docs (README-*.md, BUILD-*.md) intentionally name the fork
  # and are excluded.
  # -------------------------------------------------------------------------
  forbidden-identifiers:
    name: no fork-local identifiers in upstream-destined code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan hw/ C sources
        run: |
          set -e
          pattern='mos15|opencore15|mos-qemu|MattJackson|mjackson|pq\.io'
          # `grep -rE` with --include keeps the scope tight. Exit 0 means
          # no match (good). Exit 1 means match (bad). Exit 2 means error.
          if grep -rnE --include='*.c' --include='*.h' "$pattern" hw/; then
            echo "::error::Fork-local identifier found in hw/ C/H source."
            echo "These files are destined for upstream QEMU. Remove the identifier."
            exit 1
          fi
          echo "hw/ C/H sources: clean."

      - name: Scan upstream-pr patch bodies (added lines only)
        run: |
          set -e
          pattern='mos15|opencore15|mos-qemu|MattJackson|mjackson'
          violations=0
          # Note: we deliberately do NOT match `pq.io` here — it only appears
          # as `matthew@pq.io` in From:/Signed-off-by: mail headers, which
          # are expected in `git am` patches. If we ever add a forbidden
          # `@pq.io` marker inside a diff body, extend this regex.
          while IFS= read -r -d '' f; do
            # A unified-diff added line starts with exactly one `+` (not
            # `+++` — that's the file-header marker). Awk-extract only those.
            matches=$(awk '/^\+\+\+ /{next} /^\+/{print NR": "$0}' "$f" \
                      | grep -E "$pattern" || true)
            if [ -n "$matches" ]; then
              echo "::error file=$f::Fork-local identifier in patch-added code:"
              echo "$matches"
              violations=$((violations+1))
            fi
          done < <(find upstream-pr -type f -name '*.patch' -print0)
          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations patch file(s) contain fork-local identifiers in added code."
            exit 1
          fi
          echo "upstream-pr patches (added lines): clean."
